name: Publish to NPM

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  tests:
    uses: ./.github/workflows/tests.yml

  publish:
    needs: [ quality, tests ]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(jq -r .version package.json)

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PKG_VERSION, tag=v$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version check passed: v$PKG_VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
        # O bun não tem suporte oficial a provenance, então usar o npm para publicar

      - name: Install dependencies
        run: bun ci

      - name: Build for production
        run: bun run build
        env:
          NODE_ENV: production

      - name: Validate package
        run: bunx publint

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # O bun não tem suporte oficial a provenance, então usar o npm para publicar
        # Quando provenance estiver disponível, migrar para bun publish
