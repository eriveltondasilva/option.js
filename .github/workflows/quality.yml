name: Code Quality

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Type check
        run: bun run types

      - name: Biome check
        run: bun run check:ci
