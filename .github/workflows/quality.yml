name: Code Quality

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun ci

      - name: Type check
        run: bun run types

      - name: Biome check
        run: bun run check:ci
